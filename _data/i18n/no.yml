home:
  welcome: NAUSTVIK SLIPP & BÅTBYGGERI AS
  subtitle: En allsidig bedrift innen service og vedlikehold av yrkes- og fritidsbåter
  book_now: Bestill Slipp
  about:
    title: Om oss
    text1: Naustvik Slipp & Båtbyggeri slipper, reparerer og vedlikeholder båter opp til 80 fot.
    text2: Vi jobber for å hjelpe båteiere med vedlikeholdet og fasiliterer til dette med stor slipp både inne og ute. Vi kan ta inn 60 fot inne, og opptil 80 fot ute. Vi har også et flytenaust med plass til 60 fot.
  features:
    professional:
      title: Profesjonell Service
      desc: Slipping, reparasjon og vedlikehold av båter opp til 80 fot
    booking:
      title: Enkel Bestilling
      desc: Online bestillingssystem med sanntids tilgjengelighet
    safety:
      title: Kompetanse & Erfaring
      desc: Nærmere 80 år med båtbygging og reparasjoner
  history:
    title: Historie
    text1: Naustvik Slipp & Båtbyggeri er en bedrift med lang historie, nærmere 80 år med båtbygging og reparasjoner. To generasjoner Naustvik, Dave og Sverre, så Morten Meling, og nå drives det av trebåtbygger Jacob Hunsbeth, (Trebåtbyggjarskulen i Jondal 1997).
    text2: Jacob har drevet med båtbygging siden 2000, da han fikk fagbrev i trebåtbygging. Han har drevet med båtopplag, reparasjoner og vedlikehold, samt trebåt- og RIB-bygging i Kina.
    text3: Da han fikk tilbudet om å overta Naustvik Slipp og Båtbyggeri, var det en mulighet han ikke kunne si nei til.

