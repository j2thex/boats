history:
  title: History
  text1: Naustvik Slipp & Båtbyggeri has a long history, nearly 80 years of boat building and repairs. Two generations of Naustvik, Dave and Sverre, then Morten Meling, and now it is run by wooden boat builder Jacob Hunsbeth (Trebåtbyggjarskulen i Jondal 1997).
  text2: Jacob has been involved in boat building since 2000, when he received his certificate in wooden boat building. He has worked with boat storage, repairs and maintenance, as well as wooden boat and RIB building in China.
  text3: When he was offered to take over Naustvik Slipp og Båtbyggeri, it was an opportunity he couldn't refuse. 