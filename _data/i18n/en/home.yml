about:
  title: About Us
  text1: Naustvik Slipp & Båtbyggeri provides slipway, repair and maintenance services for boats up to 80 feet.
  text2: We help boat owners with maintenance and facilitate this with large slipways both indoors and outdoors. We can accommodate up to 60 feet indoors, and up to 80 feet outdoors. We also have a floating boathouse with space for 60 feet.

