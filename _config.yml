# Site settings
title: Naustvik Slipp & Båtbyggeri
description: Professional boat yard services for commercial and leisure vessels
baseurl: ""
url: "https://hunsbeth.com"
domain: hunsbeth.com

# Build settings
markdown: kramdown
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# Defaults for all pages
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "en"
    values:
      lang: en
  - scope:
      path: "no"
    values:
      lang: no

# Exclude files
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .git

sass:
  style: compressed
  sass_dir: _sass 

google_calendar:
  api_key: "YOUR_API_KEY"
  calendar_id: "YOUR_CALENDAR_ID"